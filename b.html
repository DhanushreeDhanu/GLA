<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- AOS -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <title>World Map Section</title>

  <link rel="stylesheet" href="style.css">
</head>
<style>
 body {
  font-family: 'Segoe UI', sans-serif;
  background: #f5f5f5;
}

/* SECTION */
.worldmap_section_wrapper {
  padding: 80px 0;
  background: #f2f2f2;
}

/* HEADING */
.world_map h2 {
  font-size: 42px;
  font-weight: 700;
  color: #2e5d3d;
  margin-bottom: 10px;
}

.subtitle {
  font-size: 18px;
  color: #333;
  max-width: 700px;
  margin: 0 auto 40px;
}

/* VIDEO */
.map_video {
  position: relative;
}

.map_video video {
  width: 100%;
  border-radius: 10px;
}

/* OVERLAY CONTENT */
.map_content {
  position: absolute;
  bottom: 40px;
  left: 40px;
  text-align: left;
}

.map_content h3 {
  font-size: 60px;
  font-weight: 700;
  color: #2e5d3d;
}

.map_content p {
  font-size: 18px;
  color: #333;
  margin-top: 10px;
  line-height: 1.4;
}

/* RESPONSIVE */
@media (max-width: 768px) {

  .world_map h2 {
    font-size: 28px;
  }

  .subtitle {
    font-size: 15px;
  }

  .map_content {
    position: static;
    text-align: center;
    margin-top: 20px;
  }

  .map_content h3 {
    font-size: 40px;
  }
}
</style>
<body>

<section class="worldmap_section_wrapper">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-xl-10 col-lg-11">

        <div class="world_map text-center">

          <!-- Heading -->
          <h2>A Global Network of Change-Makers</h2>

          <p class="subtitle">
            Our GLAdiators span across the globe, contributing to leading
            companies, startups, and research institutions
          </p>

          <!-- Video Map -->
          <div class="map_video">
            <video autoplay muted loop playsinline>
              <source src="https://glaonline.com/siteassets/images/world-map.mp4" type="video/mp4">
            </video>

            <!-- Overlay Content -->
            <div class="map_content" data-aos="fade-up">
              <h3>86%</h3>
              <p>Average placement<br>over the last 5 years.</p>
            </div>

          </div>

        </div>

      </div>
    </div>
  </div>
</section>

<!-- JS -->
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
  AOS.init({
    once: true
  });
</script>

</body>
</html>
