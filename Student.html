<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Student Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      min-height: 90vh;
      background: #f7f8fa;
      font-family: Arial, sans-serif;
    }

    .login-logo {
      max-width: 580px;
      width: 100%;
    }

    .login-title {
      color: #0f7d33;
      font-weight: 600;
    }

    .login-btn {
      background: #16823a;
      border: none;
      height: 48px;
      font-size: 16px;
      font-weight: 600;
    }

    .login-btn:hover {
      background: #0f6d2f;
    }

    .captcha-box {
      width: 300px;
      max-width: 100%;
      min-height: 55px;
      background: #222;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 15px;
      margin-bottom: 20px;
      cursor: pointer;
      user-select: none;
    }

    .captcha-check {
      width: 25px;
      height: 25px;
      border: 2px solid #aaa;
      border-radius: 3px;
      background: #fff;
      position: relative;
    }

    .captcha-check.checked::after {
      content: "✔";
      position: absolute;
      color: green;
      font-size: 18px;
      left: 3px;
      top: -2px;
      font-weight: bold;
    }

    .help-btn {
      position: fixed;
      right: 14px;
      bottom: 14px;
      background: #336b39;
      color: white;
      border-radius: 100px;
      padding: 10px 18px;
      font-weight: 600;
    }

    .error-msg {
      color: red;
      font-size: 14px;
      margin-top: 5px;
    }

    @media (max-width: 991px) {
      .left-area {
        text-align: center;
        margin-bottom: 40px;
      }

      .login-logo {
        max-width: 430px;
      }
    }

    @media (max-width: 576px) {
      body {
        background: #fff;
      }

      .login-logo {
        max-width: 300px;
      }

      .login-title {
        font-size: 24px;
      }

      .login-card {
        padding: 0 10px;
      }
    }
  </style>
</head>

<body>

  <div class="container-fluid min-vh-100 d-flex align-items-center">
    <div class="container">
      <div class="row align-items-center justify-content-center">

        <div class="col-lg-6 left-area">
          <img src="HLI/logo2.jpg" alt="GLA University Online Education" class="login-logo">
        </div>

        <div class="col-lg-5 col-md-8">
          <div class="login-card">

            <p class="mb-1 fw-semibold">Welcome back</p>
            <h2 class="login-title mb-4">Login to your account</h2>

            <form id="loginForm" novalidate>

              <div class="mb-4">
                <label class="form-label fw-semibold">Email</label>
                <input type="email" id="email" class="form-control form-control-lg" placeholder="Email">
                <div class="error-msg" id="emailError"></div>
              </div>

              <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" id="password" class="form-control form-control-lg" placeholder="Password">
                <div class="error-msg" id="passwordError"></div>
              </div>

              <div class="mb-4">
                <label class="form-label fw-semibold">Role</label>
                <select id="role" class="form-select form-select-lg">
                  <option value="">Select Role</option>
                  <option>Student</option>
                  <option>Admin</option>
                  <option>Counsellor</option>
                </select>
                <div class="error-msg" id="roleError"></div>
              </div>

              <div class="captcha-box" id="captchaBox">
                <div class="captcha-check" id="captchaCheck"></div>
                <span>Verify you are human</span>
              </div>
              <div class="error-msg mb-3" id="captchaError"></div>

              <button type="submit" class="btn btn-success login-btn w-100">
                Login
              </button>

              <a href="#" class="d-block mt-3 text-decoration-none text-dark">
                Forgot Password?
              </a>

            </form>

          </div>
        </div>

      </div>
    </div>
  </div>

  <div class="help-btn">ⓘ Help</div>

  <script>
    const form = document.getElementById("loginForm");
    const captchaBox = document.getElementById("captchaBox");
    const captchaCheck = document.getElementById("captchaCheck");

    let captchaVerified = false;

    captchaBox.addEventListener("click", function () {
      captchaVerified = !captchaVerified;
      captchaCheck.classList.toggle("checked", captchaVerified);
    });

    form.addEventListener("submit", function (e) {
      e.preventDefault();

      let isValid = true;

      // Inputs
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const role = document.getElementById("role").value;

      // Error elements
      const emailError = document.getElementById("emailError");
      const passwordError = document.getElementById("passwordError");
      const roleError = document.getElementById("roleError");
      const captchaError = document.getElementById("captchaError");

      // Clear previous errors
      emailError.textContent = "";
      passwordError.textContent = "";
      roleError.textContent = "";
      captchaError.textContent = "";

      // Email validation
      const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!email) {
        emailError.textContent = "Email is required.";
        isValid = false;
      } else if (!emailPattern.test(email)) {
        emailError.textContent = "Enter a valid email address.";
        isValid = false;
      }

      // Password validation
      if (!password) {
        passwordError.textContent = "Password is required.";
        isValid = false;
      } else if (password.length < 6) {
        passwordError.textContent = "Password must be at least 6 characters.";
        isValid = false;
      }

      // Role validation
      if (!role) {
        roleError.textContent = "Please select a role.";
        isValid = false;
      }

      // Captcha validation
      if (!captchaVerified) {
        captchaError.textContent = "Please verify captcha.";
        isValid = false;
      }

      // Final
      if (isValid) {
        alert("Login Successful!");
        form.reset();
        captchaVerified = false;
        captchaCheck.classList.remove("checked");
      }
    });
  </script>

</body>
</html>
