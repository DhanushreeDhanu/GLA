<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
          
/* ===== FOOTER ===== */
.glaFooter_section{
  background:#1d1714;
  padding:40px 18px 30px;
  color:#fff;
}

.glaFooter_container{
  max-width:1200px;
  margin:0 auto;
}

/* ===== LINKS ===== */
.glaFooter_links{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:18px 22px;
}

.glaFooter_links a{
  color:#fff;
  text-decoration:none;
  font-size:15px;
  
  transition:0.3s;
}

.glaFooter_links a:hover{
  color:#ffc400;
}

/* LINE */
.glaFooter_line{
  height:1px;
  background:rgba(255,255,255,.2);
  margin:28px 0;
}

/* ===== BOTTOM ===== */
.glaFooter_bottom{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  gap:20px;
}

/* TEXT */
.glaFooter_copy,
.glaFooter_credit{
  font-size:13px;
  
}

.glaFooter_credit{
  text-align:right;
}

/* ===== SOCIAL ICONS ===== */
.glaFooter_social{
  display:flex;
  justify-content:center;
  gap:12px;
}

.glaFooter_social a{
  width:40px;
  height:40px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  color:#fff;
  text-decoration:none;
  transition:0.3s;
}

/* FACEBOOK */
.glaFb{
  background:#1877f2;
}

/* YOUTUBE */
.glaYt{
  background:#ff0000;
}

/* INSTAGRAM */
.glaInsta{
  background: radial-gradient(circle at 30% 30%, 
    #feda75, #fa7e1e, #d62976, #962fbf, #4f5bd5);
}

/* HOVER */
.glaFooter_social a:hover{
  transform:scale(1.1);
}

/* ===== MOBILE ===== */
@media(max-width:768px){

  .glaFooter_links{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:28px 40px;
    text-align:left;
  }

  .glaFooter_links a{
    font-size:18px;
  }

  .glaFooter_bottom{
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    gap:12px;
  }

  /* ORDER FIX */
  .glaFooter_copy{
    order:1;
  }

  .glaFooter_credit{
    order:2;
    text-align:center;
  }

  .glaFooter_social{
    order:3;
    margin-top:10px;
  }
}



    </style>
</head>
<body>
    
    <footer class="glaFooter_section">

      <div class="glaFooter_container">

        <!-- LINKS -->
        <div class="glaFooter_links">
          <a href="#">About Us</a>
          <a href="#">Admissions</a>
          <a href="#">Programs</a>
          <a href="#">Events @ GLA</a>
          <a href="#">FAQs</a>
          <a href="#">Testimonials</a>
          <a href="#">Terms & Conditions</a>
          <a href="#">Privacy Policy</a>
          <a href="#">Disclaimer</a>
          <a href="#">Mandatory Disclosure</a>
          <a href="#">Contact Us</a>
        </div>

        <!-- LINE -->
        <div class="glaFooter_line"></div>

        <!-- BOTTOM -->
        <div class="glaFooter_bottom">

          <!-- LEFT -->
          <div class="glaFooter_copy">
            © Copyright 2026 - GLA Online. All Rights Reserved.
          </div>

          <!-- CENTER -->
          <div class="glaFooter_social">
            <a href="#" class="glaFb"><i class="fab fa-facebook-f"></i></a>
            <a href="#" class="glaYt"><i class="fab fa-youtube"></i></a>
            <a href="#" class="glaInsta"><i class="fab fa-instagram"></i></a>
          </div>

          <!-- RIGHT -->
          <div class="glaFooter_credit">
            Website Design and Developed by Sterco Digitex
          </div>

        </div>

      </div>

    </footer>


</body>
</html>
