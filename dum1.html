<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLA Mega Menu Clean</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

/* HEADER */
.header {
  background: #ffd331;
  padding: 15px 40px;
}

.logo img {
  width: 260px;
}

/* NAV */
.nav-link {
  font-weight: 600;
  color: #000 !important;
}

/* BUTTON */
.btn-green {
  background: #2f6f35;
  color: #fff;
  font-weight: 600;
}

/* MEGA MENU */
.mega-menu {
  position: absolute;
  left: 0;
  top: 100%;
  width: 100%;
  background: #ffd331;
  padding: 30px;
  display: none;
}

.nav-item:hover .mega-menu {
  display: block;
}

/* CARD */
.program-card {
  position: relative;
  overflow: hidden;
  border-radius: 8px;
  cursor: pointer;
}

.program-card img {
  width: 100%;
  height: 250px;
  object-fit: cover;
}

/* TEXT */
.card-content {
  position: absolute;
  bottom: 10px;
  left: 10px;
  color: #fff;
}

.program-tag {
  position: absolute;
  top: 10px;
  right: 10px;
  background: green;
  color: #fff;
  padding: 2px 8px;
  font-size: 12px;
}

/* HOVER DETAILS */
.details {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.85);
  color: #fff;
  padding: 15px;
  display: none;
}

.program-card:hover .details {
  display: block;
}

.details ul {
  padding-left: 15px;
  font-size: 13px;
}

</style>
</head>

<body>

<header class="header">
  <div class="container-fluid d-flex justify-content-between align-items-center">

    <!-- LOGO -->
    <div class="logo">
      <img src="https://glaonline.com/siteassets/images/green-logo.webp">
    </div>

    <!-- RIGHT SIDE -->
    <div>

      <!-- TOP LINKS -->
      <div class="d-flex gap-3 mb-2 justify-content-end">
        <a href="#"><i class="bi bi-envelope"></i> Mail</a>
        <a href="#"><i class="bi bi-telephone"></i> Call</a>
        <a href="#" class="btn btn-green btn-sm">Apply</a>
      </div>

      <!-- NAV -->
      <ul class="nav">

        <li class="nav-item">
          <a class="nav-link" href="#">About</a>
        </li>

        <!-- MEGA MENU -->
        <li class="nav-item position-relative">
          <a class="nav-link" href="#">Programs</a>

          <div class="mega-menu">
            <div class="container">
              <div class="row g-3">

                <!-- CARD -->
                <div class="col-md-3">
                  <div class="program-card">
                    <img src="https://glaonline.com/uploads/course_group/6928264fb0a231764238927.webp">
                    <span class="program-tag">PG</span>

                    <div class="card-content">
                      <small>Master of</small>
                      <h6>MBA</h6>
                    </div>

                    <div class="details">
                      <h6>MBA Specializations</h6>
                      <ul>
                        <li>Finance</li>
                        <li>HR</li>
                        <li>Marketing</li>
                      </ul>
                    </div>
                  </div>
                </div>

                <!-- MCA -->
                <div class="col-md-3">
                  <div class="program-card">
                    <img src="https://glaonline.com/uploads/course_group/68aef588901ea1756296584.webp">
                    <span class="program-tag">PG</span>

                    <div class="card-content">
                      <small>Master of</small>
                      <h6>MCA</h6>
                    </div>
                  </div>
                </div>

                <!-- BBA -->
                <div class="col-md-3">
                  <div class="program-card">
                    <img src="https://glaonline.com/uploads/course_group/68aedd4b265be1756290379.webp">
                    <span class="program-tag">UG</span>

                    <div class="card-content">
                      <small>Bachelor of</small>
                      <h6>BBA</h6>
                    </div>

                    <div class="details">
                      <h6>BBA Specializations</h6>
                      <ul>
                        <li>Marketing</li>
                        <li>Finance</li>
                      </ul>
                    </div>
                  </div>
                </div>

                <!-- BCA -->
                <div class="col-md-3">
                  <div class="program-card">
                    <img src="https://glaonline.com/uploads/course_group/68aedd8f853ee1756290447.webp">
                    <span class="program-tag">UG</span>

                    <div class="card-content">
                      <small>Bachelor of</small>
                      <h6>BCA</h6>
                    </div>
                  </div>
                </div>

              </div>
            </div>
          </div>

        </li>

      </ul>

    </div>

  </div>
</header>

</body>
</html>
